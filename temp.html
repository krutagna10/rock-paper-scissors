<script>
    let computerChoiceGenerator = () => {
        let choices = ['rock', 'paper', 'scissors'];
        let random = Math.floor(Math.random() * 3);
        return choices[random];
    }

    let winConditions = [
        ['rock', 'scissors'],
        ['scissors', 'paper'],
        ['paper', 'rock'],
    ]

    const isEqual = (arr1, arr2) => {
       return arr1.join() === arr2.join();
    }

    let checkForWin = (choices) => {
       return winConditions.findIndex(element => element.join() === choices.join()) !== -1;
    }

    let userChoice = 'scissors';
    let computerChoice = 'paper';
    let choices = [userChoice, computerChoice];

    console.log(checkForWin(choices));

    if (userChoice === computerChoice) {
        console.log('Draw');
    }

    if (checkForWin(choices)) {
        console.log('User Wins');
    } else {
        console.log('Computer Wins');
    }
